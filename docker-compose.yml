services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: studysync
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  etl:
    build:
      context: ./datalake
      dockerfile: Dockerfile.etl
    command: python3 -u etl_pipeline.py
    env_file: .env
    depends_on:
      - db
    volumes:
      - delta_lake_data:/data/delta-lake
    restart: "no"

  recommender:
    build:
      context: ./datalake
      dockerfile: Dockerfile.etl
    command: python recommender.py
    env_file: .env
    depends_on:
      - db
      - etl
    volumes:
      - delta_lake_data:/data/delta-lake
    restart: "no"

volumes:
  pgdata:
  delta_lake_data: