# render.yaml — Render Blueprint for StudySynq backend
#
# Deploys: API gateway + 11 FastAPI microservices (free web services) and
# the ETL/recommender pipeline (free background worker).
#
# Does NOT include Postgres or the frontend on purpose:
#   - Postgres: point DATABASE_URL at your existing Supabase project's
#     Postgres connection string (Supabase → Project Settings → Database →
#     Connection string → "URI", use the pooled "Transaction" one). Render's
#     own free Postgres auto-deletes after 30 days, which breaks "always on."
#   - Frontend: deploy frontend/ to Vercel instead (better fit for Next.js,
#     see notes at the end of this file).
#
# Setup:
#   1. Push this file to the repo root (already done).
#   2. Render dashboard → New → Blueprint → connect this repo.
#   3. Render finds render.yaml and proposes all services below.
#   4. Every env var marked `sync: false` prompts you for a value at
#      deploy time (or set later in each service's Environment tab) —
#      these are the secrets that must NOT live in git.
#   5. First deploy: expect ~15-20 min while all 12 services build.

services:
  # ── API Gateway ────────────────────────────────────────────────────────
  - type: web
    name: studysynq-gateway
    runtime: docker
    plan: free
    dockerContext: ./api-gateway
    dockerfilePath: ./api-gateway/Dockerfile
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_SERVICE_URL
        value: http://studysynq-auth:8001
      - key: USERS_SERVICE_URL
        value: http://studysynq-users:8002
      - key: GROUPS_SERVICE_URL
        value: http://studysynq-groups:8003
      - key: SESSIONS_SERVICE_URL
        value: http://studysynq-sessions:8004
      - key: RESOURCES_SERVICE_URL
        value: http://studysynq-resources:8005
      - key: COURSES_SERVICE_URL
        value: http://studysynq-courses:8006
      - key: ADMIN_SERVICE_URL
        value: http://studysynq-admin:8007
      - key: RECOMMENDATIONS_SERVICE_URL
        value: http://studysynq-recommendations:8008
      - key: NOTIFICATIONS_SERVICE_URL
        value: http://studysynq-notifications:8009
      - key: ANNOUNCEMENTS_SERVICE_URL
        value: http://studysynq-announcements:8010
      - key: TASKS_SERVICE_URL
        value: http://studysynq-tasks:8011

  # ── Auth Service (US-A.1/A.2) ─────────────────────────────────────────
  - type: web
    name: studysynq-auth
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./services/auth-service/Dockerfile
    healthCheckPath: /auth/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: COOKIE_SECURE
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: SERVICE_PORT
        value: "8001"

  # ── Users Service (US-G.5) ────────────────────────────────────────────
  - type: web
    name: studysynq-users
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./services/users-service/Dockerfile
    healthCheckPath: /users/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SERVICE_PORT
        value: "8002"
      - key: GROQ_API_KEY
        sync: false

  # ── Groups Service ─────────────────────────────────────────────────────
  - type: web
    name: studysynq-groups
    runtime: docker
    plan: free
    dockerContext: .
