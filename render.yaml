        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SERVICE_PORT
        value: "8003"

  # ── Sessions Service ────────────────────────────────────────────────────
  - type: web
    name: studysynq-sessions
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./services/sessions-service/Dockerfile
    healthCheckPath: /sessions/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SERVICE_PORT
        value: "8004"
      - key: GROQ_API_KEY
        sync: false

  # ── Resources Service (US-D.1) ────────────────────────────────────────
  - type: web
    name: studysynq-resources
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./services/resources-service/Dockerfile
    healthCheckPath: /resources/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SERVICE_PORT
        value: "8005"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: resources

  # ── Courses Service ─────────────────────────────────────────────────────
  - type: web
    name: studysynq-courses
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./services/courses-service/Dockerfile
