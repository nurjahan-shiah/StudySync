      - key: SERVICE_PORT
        value: "8011"
        

# ─────────────────────────────────────────────────────────────────────────
# Frontend (deploy separately on Vercel — not part of this blueprint):
#
#   1. vercel.com → New Project → import this repo.
#   2. Root Directory: frontend
#   3. Environment variables:
#        NEXT_PUBLIC_API_URL          = https://studysynq-gateway.onrender.com
#        NEXT_PUBLIC_SUPABASE_URL     = <your Supabase project URL>
#        NEXT_PUBLIC_SUPABASE_ANON_KEY = <your Supabase anon key>
#        NEXT_PUBLIC_SUPABASE_BUCKET  = resources
#   4. Deploy. Vercel auto-detects Next.js — no Dockerfile needed there.
#   5. Back in Render, set the gateway's CORS to allow the Vercel domain
#      (add a CORS_ORIGINS env var to studysynq-gateway if the gateway
#      code reads one — check api-gateway/main.py's CORSMiddleware config).
# ─────────────────────────────────────────────────────────────────────────