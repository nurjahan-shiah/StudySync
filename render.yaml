        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SERVICE_PORT
        value: "8008"
      - key: DELTA_LAKE_PATH
        value: /data/delta-lake

  # ── Notifications Service ───────────────────────────────────────────────
  - type: web
    name: studysynq-notifications
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./services/notifications-service/Dockerfile
    healthCheckPath: /notifications/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LOG_LEVEL
