      - key: SERVICE_PORT
        value: "8009"

  # ── Announcements Service (US-E.2) ──────────────────────────────────────
  - type: web
    name: studysynq-announcements
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./services/announcements-service/Dockerfile
    healthCheckPath: /announcements/health
    envVars:
